
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <style>
        
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-image: url('background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.login-container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); 
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 100%;
    max-width: 400px;
    color: #fff;
}

.login-container h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2rem;
    font-weight: 600;
    letter-spacing: 1px;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
}

.input-group input:focus {
    border-color: #fff;
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
}

.input-group input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-bottom: 25px;
}

.options label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.forgot-pass, .signup-text a {
    color: #fff;
    text-decoration: none;
    font-weight: 500;
}

.forgot-pass:hover, .signup-text a:hover {
    text-decoration: underline;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s ease, transform 0.1s ease;
}

.login-btn:hover {
    background: #e6e6e6;
}

.login-btn:active {
    transform: scale(0.98);
}

.signup-text {
    text-align: center;
    margin-top: 20px;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.8);
}
    </style>
</head>
<body>
    <div class="login-container">
        <h2>login</h2>
        <form action="#" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            
            <div class="options">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="3resetpassword.html" class="forgot-pass">Forgot Password?</a>
            </div>
            
            <button type="submit" class="login-btn">login</button>
            
            <p class="signup-text">Don't have an account? <a href="1signup.html">Sign up</a></p>
        </form>
    </div>
</body>
</html>
